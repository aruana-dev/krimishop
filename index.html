<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krimishop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            color: #c62828;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        p {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Krimishop</h1>
        <p>Kommt bald &mdash; bleiben Sie dran.</p>
    </div>
</body>
</html>
